name: Deploy Infrastructure (CDK)

# Runs when infrastructure code changes land on main.
# Uses GitHub OIDC — no AWS keys stored in secrets.
on:
  push:
    branches: [main]
    paths:
      - "infrastructure/**"
      - ".github/workflows/deploy-infra.yml"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  id-token: write   # required for OIDC token request
  contents: read

env:
  AWS_REGION: us-west-2
  CDK_DEFAULT_REGION: us-west-2
  NODE_VERSION: "22"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cdk-deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    environment: production  # optional: requires manual approval gate in GitHub

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: infrastructure/package-lock.json

      # ── AWS credentials via OIDC (no long-lived keys) ───────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Install CDK dependencies ─────────────────────────────────────────────
      - name: Install CDK dependencies
        working-directory: infrastructure
        run: npm ci

      # ── CDK diff (shows what will change — logged for review) ────────────────
      - name: CDK Diff
        working-directory: infrastructure
        run: npx cdk diff MtelesPortfolioStack 2>&1 || true  # non-fatal

      # ── CDK Deploy ───────────────────────────────────────────────────────────
      - name: CDK Deploy
        working-directory: infrastructure
        run: |
          npx cdk deploy MtelesPortfolioStack \
            --require-approval never \
            --outputs-file cdk-outputs.json \
            --ci

      # ── Upload CDK outputs as artifact ───────────────────────────────────────
      - name: Upload CDK outputs
        uses: actions/upload-artifact@v4
        with:
          name: cdk-outputs
          path: infrastructure/cdk-outputs.json
          retention-days: 30
